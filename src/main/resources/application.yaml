spring:
  application:
    name: petcare

  h2:
    console:
      enabled: true
      path: /h2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  datasource:
    url: jdbc:h2:mem:petcare
    username: sa
    password:
    driver-class-name: org.h2.Driver

